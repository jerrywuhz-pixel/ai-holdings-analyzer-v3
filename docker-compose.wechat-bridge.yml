services:
  wechat-clawbot-bridge:
    image: ai-holdings-server-webapp
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      WECHAT_CLAWBOT_POLL_INTERVAL_SECONDS: ${WECHAT_CLAWBOT_POLL_INTERVAL_SECONDS:-5}
      WECHAT_CLAWBOT_POLL_URL: ${WECHAT_CLAWBOT_POLL_URL:-http://webapp:3000/api/openclaw/wechat/poll}
    command:
      - node
      - -e
      - |
        const intervalMs = Math.max(2, Number(process.env.WECHAT_CLAWBOT_POLL_INTERVAL_SECONDS || 5)) * 1000;
        const url = process.env.WECHAT_CLAWBOT_POLL_URL || 'http://webapp:3000/api/openclaw/wechat/poll';
        const secret = process.env.OPENCLAW_CRON_SECRET || process.env.WECHAT_CLAWBOT_BRIDGE_SECRET || '';
        let inFlight = false;
        function shouldLog(text) {
          return (
            /"rawMessagesReceived":[1-9]/.test(text) ||
            /"messagesSeen":[1-9]/.test(text) ||
            /"errors":\[[^\]]/.test(text)
          );
        }
        async function tick() {
          if (inFlight) return;
          inFlight = true;
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { Authorization: `Bearer $${secret}` },
            });
            const text = await response.text();
            if (!response.ok || shouldLog(text)) {
              console.log(new Date().toISOString(), response.status, text.slice(0, 1000));
            }
          } catch (error) {
            console.error(new Date().toISOString(), error && error.message ? error.message : error);
          } finally {
            inFlight = false;
          }
        }
        tick();
        setInterval(tick, intervalMs);
    depends_on:
      webapp:
        condition: service_healthy
