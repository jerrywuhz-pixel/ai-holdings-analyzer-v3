  <path class="line" marker-end="url(#arrow)" d="M590 248 L630 248"/>
  <path class="line" marker-end="url(#arrow)" d="M868 248 L908 248"/>
  <path class="line" marker-end="url(#arrow)" d="M1146 248 L1186 248"/>

