  <text class="small" x="1218" y="812">展示页 / 非 P0 计费</text>

  <path class="line" marker-end="url(#arrow)" d="M475 692 L475 742"/>
  <path class="line" marker-end="url(#arrow)" d="M753 692 L753 742"/>
  <path class="line" marker-end="url(#arrow)" d="M1031 692 L1031 742"/>
  <path class="line" marker-end="url(#arrow)" d="M1277 692 L1277 742"/>

  <path class="lineRed" marker-end="url(#arrowRed)" d="M1031 436 C1031 500 197 518 197 592"/>
  <text class="small" x="250" y="520">注册完成后进入登录后工作台；新用户未完成配置时先进入 onboarding/welcome。</text>
