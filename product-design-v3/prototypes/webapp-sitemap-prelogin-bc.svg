  <text class="small" x="662" y="662">股票 ETF / 期权 / 来源</text>

  <rect class="card" x="916" y="600" rx="8" ry="8" width="230" height="92"/>
  <text class="label" x="940" y="636">研究</text>
  <text class="small" x="940" y="662">AI 任务 / 报告 / 证据链</text>

