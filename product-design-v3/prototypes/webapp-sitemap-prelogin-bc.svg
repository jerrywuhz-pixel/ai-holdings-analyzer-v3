  <path class="line" marker-end="url(#arrow)" d="M312 646 L352 646"/>
  <path class="line" marker-end="url(#arrow)" d="M590 646 L630 646"/>
  <path class="line" marker-end="url(#arrow)" d="M868 646 L908 646"/>
  <path class="line" marker-end="url(#arrow)" d="M1146 646 L1186 646"/>

  <rect class="card" x="360" y="750" rx="8" ry="8" width="230" height="92"/>
  <text class="label" x="384" y="786">关注清单</text>
  <text class="small" x="384" y="812">机会 / 触发条件 / 提醒</text>

  <rect class="card" x="638" y="750" rx="8" ry="8" width="230" height="92"/>
  <text class="label" x="662" y="786">清仓复盘</text>
  <text class="small" x="662" y="812">历史持仓 / 二次买入</text>

  <rect class="card" x="916" y="750" rx="8" ry="8" width="230" height="92"/>
  <text class="label" x="940" y="786">确认 / 消息</text>
  <text class="small" x="940" y="812">微信共用事实源</text>

  <rect class="card" x="1194" y="750" rx="8" ry="8" width="166" height="92"/>
