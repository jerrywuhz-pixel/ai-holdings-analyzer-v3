<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="940" viewBox="0 0 1440 940">
  <defs>
    <style>
      .bg { fill: #fafafa; }
      .band { fill: #f6f1ee; }
      .card { fill: #fff; stroke: #ded3ce; stroke-width: 1.2; }
      .cardRed { fill: #d71920; stroke: #d71920; stroke-width: 1.2; }
      .cardDark { fill: #262225; stroke: #262225; stroke-width: 1.2; }
      .title { font: 800 36px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #171417; }
      .subtitle { font: 500 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6f686b; }
      .label { font: 800 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #171417; }
      .labelWhite { font: 800 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6f686b; }
      .smallWhite { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: rgba(255,255,255,.82); }
      .section { font: 900 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #d71920; letter-spacing: .08em; }
      .line { fill: none; stroke: #cdbfba; stroke-width: 1.6; }
      .lineRed { fill: none; stroke: #d71920; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cdbfba"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d71920"/>
    </marker>
