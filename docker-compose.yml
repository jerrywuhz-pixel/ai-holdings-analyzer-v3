version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-holdings-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_holdings}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_holdings}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ai-holdings-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-create-buckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: ai-holdings-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_MARKET_DATA:-market-data} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_ARTIFACTS:-hermes-artifacts} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_REPLAYS:-replay-evidence} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_MEDIA:-tenant-media}
      "

  redis:
    image: redis:7-alpine
    container_name: ai-holdings-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  data-service:
    build:
      context: ./data-service
      dockerfile: Dockerfile
    container_name: ai-holdings-data-service
    restart: unless-stopped
    ports:
      - "${DATA_SERVICE_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_holdings}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      FTSHARE_MARKET_DATA_SKILL_DIR: ${FTSHARE_MARKET_DATA_SKILL_DIR:-/app/skills/ftshare-market-data}
      FTSHARE_MARKET_DATA_TIMEOUT_SECONDS: ${FTSHARE_MARKET_DATA_TIMEOUT_SECONDS:-10}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-minio}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OBJECT_STORAGE_BUCKET_MARKET_DATA: ${MINIO_BUCKET_MARKET_DATA:-market-data}
      OBJECT_STORAGE_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS:-hermes-artifacts}
      OBJECT_STORAGE_BUCKET_REPLAYS: ${MINIO_BUCKET_REPLAYS:-replay-evidence}
      OBJECT_STORAGE_BUCKET_MEDIA: ${MINIO_BUCKET_MEDIA:-tenant-media}
      HISTORICAL_STORAGE_BACKEND: ${HISTORICAL_STORAGE_BACKEND:-file}
      HISTORICAL_STORAGE_FILE_ROOT: ${HISTORICAL_STORAGE_FILE_ROOT:-/app/.historical-cache}
      FX_RATES_SOURCE: ${FX_RATES_SOURCE:-fallback_estimate}
      FX_RATES_JSON: ${FX_RATES_JSON:-}
      FX_RATE_ENDPOINT: ${FX_RATE_ENDPOINT:-}
      FX_RATE_API_KEY: ${FX_RATE_API_KEY:-}
      FX_RATE_TIMEOUT_SECONDS: ${FX_RATE_TIMEOUT_SECONDS:-5}
      MODEL_ADAPTER_BASE_URL: ${MODEL_ADAPTER_BASE_URL:-http://host.docker.internal:8090}
      HERMES_WORKER_MODE: ${HERMES_WORKER_MODE:-stub}
      HERMES_QUEUE_NAME: ${HERMES_QUEUE_NAME:-hermes-jobs}
      FUTU_CONNECTOR_MODE: ${FUTU_CONNECTOR_MODE:-local_mock}
      FUTU_CONNECTOR_BASE_URL: ${FUTU_CONNECTOR_BASE_URL:-http://host.docker.internal:8765}
      CONFIRMATION_HIGH_RISK_TTL_MINUTES: ${CONFIRMATION_HIGH_RISK_TTL_MINUTES:-30}
      CONFIRMATION_LOW_RISK_TTL_MINUTES: ${CONFIRMATION_LOW_RISK_TTL_MINUTES:-1440}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-buckets:
        condition: service_completed_successfully
    volumes:
      - ./data-service/src:/app/src:ro
      - ./openclaw/skills/ftshare-market-data:/app/skills/ftshare-market-data:ro
      - historical_cache:/app/.historical-cache
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  gbrain:
    build:
      context: ./gbrain
      dockerfile: Dockerfile
    container_name: ai-holdings-gbrain
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_holdings}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GBRAIN_OPENAI_API_KEY: ${GBRAIN_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      GBRAIN_OPENAI_BASE_URL: ${GBRAIN_OPENAI_BASE_URL:-}
      GBRAIN_EMBEDDING_MODEL: ${GBRAIN_EMBEDDING_MODEL:-text-embedding-3-small}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-}
      MINIMAX_OPENAI_BASE_URL: ${MINIMAX_OPENAI_BASE_URL:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-3000000}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      GBRAIN_LIVE_MODELS_ENABLED: ${GBRAIN_LIVE_MODELS_ENABLED:-false}
      MINIMAX_API_FORMAT: ${MINIMAX_API_FORMAT:-anthropic}
      MINIMAX_MAX_TOKENS: ${MINIMAX_MAX_TOKENS:-2048}
      MINIMAX_ANTHROPIC_STREAMING: ${MINIMAX_ANTHROPIC_STREAMING:-}
      OPENCLAW_MINIMAX_CLI_ENABLED: ${OPENCLAW_MINIMAX_CLI_ENABLED:-false}
      OPENCLAW_MINIMAX_MODEL: ${OPENCLAW_MINIMAX_MODEL:-minimax-portal/MiniMax-M2.7}
      OPENCLAW_CLI_PATH: ${OPENCLAW_CLI_PATH:-openclaw}
      MODEL_AUTH_MODE: ${MODEL_AUTH_MODE:-api_key}
      MODEL_ADAPTER_BASE_URL: ${MODEL_ADAPTER_BASE_URL:-http://host.docker.internal:8090}
      OPENAI_CODEX_AUTH_PROFILE: ${OPENAI_CODEX_AUTH_PROFILE:-}
      OPENAI_CODEX_BRIDGE_BASE_URL: ${OPENAI_CODEX_BRIDGE_BASE_URL:-}
      OPENAI_CODEX_BRIDGE_API_KEY: ${OPENAI_CODEX_BRIDGE_API_KEY:-}
      HERMES_AUTH_PROFILE_ID: ${HERMES_AUTH_PROFILE_ID:-}
      HERMES_WORKER_MODE: ${HERMES_WORKER_MODE:-stub}
      GBRAIN_ADAPTER_VERSION: ${GBRAIN_ADAPTER_VERSION:-0.2.0}
      OPENCLAW_UPSTREAM_TARGET_VERSION: ${OPENCLAW_UPSTREAM_TARGET_VERSION:-v2026.5.18}
      HERMES_UPSTREAM_TARGET_VERSION: ${HERMES_UPSTREAM_TARGET_VERSION:-v2026.5.16}
      HERMES_LIGHT_MODEL: ${HERMES_LIGHT_MODEL:-MiniMax-M2.7}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.7}
      HERMES_DEEP_PROVIDER: ${HERMES_DEEP_PROVIDER:-openai}
      HERMES_DEEP_MODEL: ${HERMES_DEEP_MODEL:-gpt-5.5}
      HERMES_ARTIFACT_STORAGE_BACKEND: ${HERMES_ARTIFACT_STORAGE_BACKEND:-file}
      HERMES_ARTIFACT_BASE_URI: ${HERMES_ARTIFACT_BASE_URI:-file://hermes-artifacts}
      HERMES_ARTIFACT_FILE_ROOT: ${HERMES_ARTIFACT_FILE_ROOT:-/app/.artifacts/hermes}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./gbrain/src:/app/src:ro
      - gbrain_artifacts:/app/.artifacts
    healthcheck:
      test: ["CMD", "bun", "/app/src/mcp-adapter.ts", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  openclaw:
    build:
      context: .
      dockerfile: openclaw/Dockerfile
    container_name: ai-holdings-openclaw
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      REDIS_URL: redis://redis:6379/0
      DATA_SERVICE_URL: http://data-service:8000
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-minio}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OBJECT_STORAGE_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS:-hermes-artifacts}
      OBJECT_STORAGE_BUCKET_REPLAYS: ${MINIO_BUCKET_REPLAYS:-replay-evidence}
      MODEL_ADAPTER_BASE_URL: ${MODEL_ADAPTER_BASE_URL:-http://host.docker.internal:8090}
      GBRAIN_LIVE_MODELS_ENABLED: ${GBRAIN_LIVE_MODELS_ENABLED:-false}
      MODEL_AUTH_MODE: ${MODEL_AUTH_MODE:-api_key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GBRAIN_OPENAI_API_KEY: ${GBRAIN_OPENAI_API_KEY:-}
      OPENAI_CODEX_AUTH_PROFILE: ${OPENAI_CODEX_AUTH_PROFILE:-}
      OPENAI_CODEX_BRIDGE_BASE_URL: ${OPENAI_CODEX_BRIDGE_BASE_URL:-}
      OPENAI_CODEX_BRIDGE_API_KEY: ${OPENAI_CODEX_BRIDGE_API_KEY:-}
      HERMES_AUTH_PROFILE_ID: ${HERMES_AUTH_PROFILE_ID:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_OPENAI_BASE_URL: ${MINIMAX_OPENAI_BASE_URL:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-3000000}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      MINIMAX_API_FORMAT: ${MINIMAX_API_FORMAT:-anthropic}
      MINIMAX_MAX_TOKENS: ${MINIMAX_MAX_TOKENS:-2048}
      MINIMAX_ANTHROPIC_STREAMING: ${MINIMAX_ANTHROPIC_STREAMING:-}
      OPENCLAW_MINIMAX_CLI_ENABLED: ${OPENCLAW_MINIMAX_CLI_ENABLED:-false}
      OPENCLAW_MINIMAX_MODEL: ${OPENCLAW_MINIMAX_MODEL:-minimax-portal/MiniMax-M2.7}
      OPENCLAW_CLI_PATH: ${OPENCLAW_CLI_PATH:-openclaw}
      OPENCLAW_DELIVERY_MODE: ${OPENCLAW_DELIVERY_MODE:-log}
      OPENCLAW_DELIVERY_WEBHOOK_URL: ${OPENCLAW_DELIVERY_WEBHOOK_URL:-}
      OPENCLAW_DELIVERY_WEBHOOK_SECRET: ${OPENCLAW_DELIVERY_WEBHOOK_SECRET:-}
      OPENCLAW_DELIVERY_TIMEOUT_SECONDS: ${OPENCLAW_DELIVERY_TIMEOUT_SECONDS:-10}
      HERMES_WORKER_MODE: ${HERMES_WORKER_MODE:-stub}
      GBRAIN_ADAPTER_VERSION: ${GBRAIN_ADAPTER_VERSION:-0.2.0}
      OPENCLAW_UPSTREAM_TARGET_VERSION: ${OPENCLAW_UPSTREAM_TARGET_VERSION:-v2026.5.18}
      HERMES_UPSTREAM_TARGET_VERSION: ${HERMES_UPSTREAM_TARGET_VERSION:-v2026.5.16}
      HERMES_LIGHT_MODEL: ${HERMES_LIGHT_MODEL:-MiniMax-M2.7}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.7}
      HERMES_DEEP_PROVIDER: ${HERMES_DEEP_PROVIDER:-openai}
      HERMES_DEEP_MODEL: ${HERMES_DEEP_MODEL:-gpt-5.5}
      HERMES_ARTIFACT_STORAGE_BACKEND: ${HERMES_ARTIFACT_STORAGE_BACKEND:-file}
      HERMES_ARTIFACT_BASE_URI: ${HERMES_ARTIFACT_BASE_URI:-file://hermes-artifacts}
      HERMES_ARTIFACT_FILE_ROOT: ${HERMES_ARTIFACT_FILE_ROOT:-/app/.artifacts/hermes}
      HERMES_LIGHT_TASK_TIMEOUT_SECONDS: ${HERMES_LIGHT_TASK_TIMEOUT_SECONDS:-300}
      HERMES_DEEP_TASK_TIMEOUT_SECONDS: ${HERMES_DEEP_TASK_TIMEOUT_SECONDS:-1800}
      QUIET_HOURS_DEFAULT_START: ${QUIET_HOURS_DEFAULT_START:-22:00}
      QUIET_HOURS_DEFAULT_END: ${QUIET_HOURS_DEFAULT_END:-08:00}
      DELIVERY_RATE_LIMIT_PER_HOUR: ${DELIVERY_RATE_LIMIT_PER_HOUR:-6}
      CONFIRMATION_HIGH_RISK_TTL_MINUTES: ${CONFIRMATION_HIGH_RISK_TTL_MINUTES:-30}
      CONFIRMATION_LOW_RISK_TTL_MINUTES: ${CONFIRMATION_LOW_RISK_TTL_MINUTES:-1440}
      MEDIA_ARTIFACT_TTL_DAYS: ${MEDIA_ARTIFACT_TTL_DAYS:-30}
      HERMES_ARTIFACT_TTL_DAYS: ${HERMES_ARTIFACT_TTL_DAYS:-90}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      data-service:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-buckets:
        condition: service_completed_successfully
    volumes:
      - openclaw_artifacts:/app/.artifacts

  webapp:
    image: node:20-alpine
    container_name: ai-holdings-webapp
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${WEBAPP_PORT:-3000}:3000"
    volumes:
      - ./webapp:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      data-service:
        condition: service_healthy
      openclaw:
        condition: service_started
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-https://example.supabase.co}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-dummy-anon-key}
      NEXT_PUBLIC_DATA_SERVICE_URL: http://localhost:${DATA_SERVICE_PORT:-8000}
      NEXT_PUBLIC_OPENCLAW_URL: http://localhost:${OPENCLAW_PORT:-8080}

volumes:
  postgres_data:
  redis_data:
  minio_data:
  historical_cache:
  gbrain_artifacts:
  openclaw_artifacts:
