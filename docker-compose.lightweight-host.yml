# Host-network override for lightweight servers where Docker bridge traffic is
# blocked by the provider image or server panel firewall.
#
# Usage:
#   docker compose --env-file .env.server \
#     -f docker-compose.server.yml \
#     -f docker-compose.lightweight-host.yml up -d --no-build --force-recreate

services:
  postgres:
    network_mode: host
    ports: !reset []
    command: ["postgres", "-c", "listen_addresses=127.0.0.1"]

  redis:
    network_mode: host
    ports: !reset []
    command: ["redis-server", "--appendonly", "yes", "--bind", "127.0.0.1", "--protected-mode", "yes"]

  minio:
    network_mode: host
    ports: !reset []
    command: server /data --address "127.0.0.1:9000" --console-address "127.0.0.1:9001"

  minio-create-buckets:
    network_mode: host
    extra_hosts: !reset []
    environment:
      MINIO_HOST: 127.0.0.1

  data-service:
    network_mode: host
    ports: !reset []
    extra_hosts: !reset []
    command: ["uvicorn", "src.main:app", "--host", "127.0.0.1", "--port", "8000", "--workers", "2"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      REDIS_URL: redis://127.0.0.1:${REDIS_PORT:-6379}/0
      OBJECT_STORAGE_ENDPOINT: http://127.0.0.1:${MINIO_PORT:-9000}
      HERMES_DOMAIN_TOOLS_URL: http://127.0.0.1:8000
      HERMES_INGRESS_URL: http://127.0.0.1:8000

  gbrain:
    network_mode: host
    extra_hosts: !reset []
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      GBRAIN_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      HERMES_DOMAIN_TOOLS_URL: http://127.0.0.1:8000

  webapp:
    network_mode: host
    ports: !reset []
    extra_hosts: !reset []
    environment:
      HOSTNAME: 127.0.0.1
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      DATA_SERVICE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_DATA_SERVICE_URL: http://127.0.0.1:8000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null || exit 1"]
