name: ai-holdings-server

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_holdings}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${INTERNAL_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_holdings}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${INTERNAL_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${INTERNAL_HOST_BIND:-127.0.0.1}:${MINIO_HOST_PORT:-9000}:9000"
      - "${INTERNAL_HOST_BIND:-127.0.0.1}:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio-create-buckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://${MINIO_HOST:-minio}:${MINIO_PORT:-9000} ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_MARKET_DATA:-market-data} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_ARTIFACTS:-hermes-artifacts} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_REPLAYS:-replay-evidence} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_MEDIA:-tenant-media}
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"

  data-service:
    build:
      context: ./data-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-minio}
      OBJECT_STORAGE_ENDPOINT: http://${MINIO_HOST:-minio}:${MINIO_PORT:-9000}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OBJECT_STORAGE_BUCKET_MARKET_DATA: ${MINIO_BUCKET_MARKET_DATA:-market-data}
      OBJECT_STORAGE_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS:-hermes-artifacts}
      OBJECT_STORAGE_BUCKET_REPLAYS: ${MINIO_BUCKET_REPLAYS:-replay-evidence}
      OBJECT_STORAGE_BUCKET_MEDIA: ${MINIO_BUCKET_MEDIA:-tenant-media}
      HISTORICAL_STORAGE_BACKEND: ${HISTORICAL_STORAGE_BACKEND:-file}
      HISTORICAL_STORAGE_FILE_ROOT: ${HISTORICAL_STORAGE_FILE_ROOT:-/app/.historical-cache}
      HISTORICAL_MANIFEST_BACKEND: ${HISTORICAL_MANIFEST_BACKEND:-file}
      HISTORICAL_MANIFEST_FILE_ROOT: ${HISTORICAL_MANIFEST_FILE_ROOT:-/app/.historical-manifests}
      FX_RATES_SOURCE: ${FX_RATES_SOURCE:-fallback_estimate}
      FX_RATES_JSON: ${FX_RATES_JSON:-}
      FX_RATE_ENDPOINT: ${FX_RATE_ENDPOINT:-}
      FX_RATE_API_KEY: ${FX_RATE_API_KEY:-}
      FTSHARE_MARKET_DATA_SKILL_DIR: ${FTSHARE_MARKET_DATA_SKILL_DIR:-/app/skills/ftshare-market-data}
      FTSHARE_MARKET_DATA_TIMEOUT_SECONDS: ${FTSHARE_MARKET_DATA_TIMEOUT_SECONDS:-10}
      IMA_REFERENCE_SOURCE_ENABLED: ${IMA_REFERENCE_SOURCE_ENABLED:-false}
      IMA_OPENAPI_CLIENTID: ${IMA_OPENAPI_CLIENTID:-}
      IMA_OPENAPI_APIKEY: ${IMA_OPENAPI_APIKEY:-}
      IMA_DEFAULT_KNOWLEDGE_BASE_ID: ${IMA_DEFAULT_KNOWLEDGE_BASE_ID:-}
      IMA_SKILL_VERSION: ${IMA_SKILL_VERSION:-1.1.7}
      IMA_SKILL_DIR: ${IMA_SKILL_DIR:-/app/skills/ima-skill}
      IMA_BASE_URL: ${IMA_BASE_URL:-https://ima.qq.com}
      HERMES_IMA_ARCHIVE_ENABLED: ${HERMES_IMA_ARCHIVE_ENABLED:-true}
      HERMES_IMA_ARCHIVE_UPLOAD_ENABLED: ${HERMES_IMA_ARCHIVE_UPLOAD_ENABLED:-true}
      HERMES_IMA_ARCHIVE_ROOT: ${HERMES_IMA_ARCHIVE_ROOT:-/app/.artifacts/hermes/ima-archive}
      HERMES_IMA_ARCHIVE_USE_DATE_FOLDER: ${HERMES_IMA_ARCHIVE_USE_DATE_FOLDER:-true}
      HERMES_IMA_ARCHIVE_GITHUB_BACKUP_ENABLED: ${HERMES_IMA_ARCHIVE_GITHUB_BACKUP_ENABLED:-false}
      HERMES_IMA_ARCHIVE_GITHUB_REPO: ${HERMES_IMA_ARCHIVE_GITHUB_REPO:-jerrywuhz-pixel/obsidan-vault}
      HERMES_IMA_ARCHIVE_GITHUB_BRANCH: ${HERMES_IMA_ARCHIVE_GITHUB_BRANCH:-main}
      HERMES_IMA_ARCHIVE_GITHUB_BASE_PATH: ${HERMES_IMA_ARCHIVE_GITHUB_BASE_PATH:-持仓分析系统知识库}
      HERMES_IMA_ARCHIVE_GITHUB_WORKTREE: ${HERMES_IMA_ARCHIVE_GITHUB_WORKTREE:-/app/.artifacts/hermes/github-backup/obsidan-vault}
      HERMES_IMA_ARCHIVE_GITHUB_AUTHOR_NAME: ${HERMES_IMA_ARCHIVE_GITHUB_AUTHOR_NAME:-Hermes Archive Bot}
      HERMES_IMA_ARCHIVE_GITHUB_AUTHOR_EMAIL: ${HERMES_IMA_ARCHIVE_GITHUB_AUTHOR_EMAIL:-hermes-archive-bot@users.noreply.github.com}
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LONGBRIDGE_MCP_URL: ${LONGBRIDGE_MCP_URL:-https://mcp.longbridge.com}
      LONGBRIDGE_MCP_ACCESS_TOKEN: ${LONGBRIDGE_MCP_ACCESS_TOKEN:-}
      HERMES_WORKER_MODE: ${HERMES_WORKER_MODE:-stub}
      FUTU_CONNECTOR_MODE: ${FUTU_CONNECTOR_MODE:-local_mock}
      FUTU_CONNECTOR_BASE_URL: ${FUTU_CONNECTOR_BASE_URL:-http://host.docker.internal:8765}
      HERMES_REFERENCE_CAPTURE_URL: ${HERMES_REFERENCE_CAPTURE_URL:-http://reference-capture:8010}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-buckets:
        condition: service_completed_successfully
      reference-capture:
        condition: service_healthy
    ports:
      - "${INTERNAL_HOST_BIND:-127.0.0.1}:${DATA_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./skills/ftshare-market-data:/app/skills/ftshare-market-data:ro
      - ./openclaw/skills/ima-skill:/app/skills/ima-skill:ro
      - hermes_ima_archive:/app/.artifacts/hermes/ima-archive
      - hermes_ima_github_backup:/app/.artifacts/hermes/github-backup
      - historical_cache:/app/.historical-cache
      - historical_manifests:/app/.historical-manifests

  reference-capture:
    build:
      context: ./reference-capture
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "${INTERNAL_HOST_BIND:-127.0.0.1}:${REFERENCE_CAPTURE_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  gbrain:
    build:
      context: ./gbrain
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      GBRAIN_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GBRAIN_OPENAI_API_KEY: ${GBRAIN_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      GBRAIN_OPENAI_BASE_URL: ${GBRAIN_OPENAI_BASE_URL:-}
      GBRAIN_EMBEDDING_MODEL: ${GBRAIN_EMBEDDING_MODEL:-text-embedding-3-small}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-}
      MINIMAX_OPENAI_BASE_URL: ${MINIMAX_OPENAI_BASE_URL:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-3000000}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      GBRAIN_LIVE_MODELS_ENABLED: ${GBRAIN_LIVE_MODELS_ENABLED:-false}
      MINIMAX_API_FORMAT: ${MINIMAX_API_FORMAT:-anthropic}
      MINIMAX_MAX_TOKENS: ${MINIMAX_MAX_TOKENS:-2048}
      MINIMAX_ANTHROPIC_STREAMING: ${MINIMAX_ANTHROPIC_STREAMING:-}
      HERMES_MINIMAX_CLI_ENABLED: ${HERMES_MINIMAX_CLI_ENABLED:-false}
      HERMES_MINIMAX_MODEL: ${HERMES_MINIMAX_MODEL:-minimax-portal/MiniMax-M2.7}
      HERMES_CLI_PATH: ${HERMES_CLI_PATH:-hermes}
      MODEL_AUTH_MODE: ${MODEL_AUTH_MODE:-api_key}
      MODEL_ADAPTER_BASE_URL: ${MODEL_ADAPTER_BASE_URL:-}
      OPENAI_CODEX_AUTH_PROFILE: ${OPENAI_CODEX_AUTH_PROFILE:-}
      OPENAI_CODEX_BRIDGE_BASE_URL: ${OPENAI_CODEX_BRIDGE_BASE_URL:-}
      OPENAI_CODEX_BRIDGE_API_KEY: ${OPENAI_CODEX_BRIDGE_API_KEY:-}
      HERMES_AUTH_PROFILE_ID: ${HERMES_AUTH_PROFILE_ID:-}
      HERMES_WORKER_MODE: ${HERMES_WORKER_MODE:-stub}
      HERMES_DOMAIN_TOOLS_URL: ${HERMES_DOMAIN_TOOLS_URL:-http://data-service:8000}
      HERMES_DOMAIN_TOOLS_KEY: ${HERMES_DOMAIN_TOOLS_KEY:-}
      GBRAIN_ADAPTER_VERSION: ${GBRAIN_ADAPTER_VERSION:-0.2.0}
      HERMES_UPSTREAM_TARGET_VERSION: ${HERMES_UPSTREAM_TARGET_VERSION:-v2026.5.29}
      HERMES_LIGHT_MODEL: ${HERMES_LIGHT_MODEL:-MiniMax-M2.7}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.7}
      HERMES_DEEP_PROVIDER: ${HERMES_DEEP_PROVIDER:-openai}
      HERMES_DEEP_MODEL: ${HERMES_DEEP_MODEL:-gpt-5.5}
      HERMES_ARTIFACT_STORAGE_BACKEND: ${HERMES_ARTIFACT_STORAGE_BACKEND:-file}
      HERMES_ARTIFACT_BASE_URI: ${HERMES_ARTIFACT_BASE_URI:-file://hermes-artifacts}
      HERMES_ARTIFACT_FILE_ROOT: ${HERMES_ARTIFACT_FILE_ROOT:-/app/.artifacts/hermes}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - gbrain_artifacts:/app/.artifacts
    healthcheck:
      test: ["CMD", "bun", "/app/src/mcp-adapter.ts", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  webapp:
    image: ai-holdings-server-webapp
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_DATA_SERVICE_URL: ${NEXT_PUBLIC_DATA_SERVICE_URL:-http://data-service:8000}
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-ai_holdings}
      DATA_SERVICE_URL: ${DATA_SERVICE_URL:-http://data-service:8000}
      NEXT_PUBLIC_DATA_SERVICE_URL: ${NEXT_PUBLIC_DATA_SERVICE_URL:-http://data-service:8000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      WEBAPP_RUNTIME_SCHEMA_REPAIR: ${WEBAPP_RUNTIME_SCHEMA_REPAIR:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      data-service:
        condition: service_healthy
    ports:
      - "${WEBAPP_HTTP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  historical_cache:
  historical_manifests:
  gbrain_artifacts:
  hermes_ima_archive:
  hermes_ima_github_backup:
